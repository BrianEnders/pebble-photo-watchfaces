<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Photo Watchface</title>
<style>
  :root { --bg:#1a1a1a; --surface:#242424; --border:#383838; --accent:#c8a55a; --text:#f0ede6; --muted:#888; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,sans-serif; font-size:15px; padding:0 0 40px; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 20px; }
  header h1 { font-size:17px; font-weight:600; }
  header p  { font-size:12px; color:var(--muted); margin-top:2px; }
  #log { margin:10px 16px; background:#0a0a0a; border:1px solid #333; border-radius:8px; padding:8px 10px; font-family:monospace; font-size:11px; color:#0f0; max-height:120px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; }
  .dropzone { margin:10px 16px; border:2px dashed var(--border); border-radius:10px; padding:24px 16px; text-align:center; cursor:pointer; position:relative; }
  .dropzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .dz-icon { font-size:28px; margin-bottom:6px; }
  .dz-label { font-size:14px; }
  .dz-hint  { font-size:12px; color:var(--muted); margin-top:4px; }
  .preview-wrap { display:none; flex-direction:column; align-items:center; gap:10px; padding:10px 16px; }
  .preview-wrap.show { display:flex; }
  .watch-frame { width:120px; height:120px; border-radius:50%; border:4px solid #7a5c2e; box-shadow:0 0 0 2px #c8a55a; overflow:hidden; background:#000; }
  .watch-frame canvas { width:100%; height:100%; display:block; }
  .meta { font-size:11px; color:var(--muted); text-align:center; }
  .prog-wrap { display:none; padding:0 16px 10px; }
  .prog-wrap.show { display:block; }
  .prog-bar { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .prog-fill { height:100%; background:var(--accent); border-radius:3px; width:0; transition:width .3s; }
  .prog-label { font-size:11px; color:var(--muted); margin-top:5px; }
  .btn-row { display:flex; gap:10px; padding:12px 16px; }
  .btn { flex:1; padding:12px; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; border:none; }
  .btn-cancel { background:var(--surface); color:var(--text); border:1px solid var(--border); }
  .btn-save   { background:var(--accent); color:#1a1100; }
  .btn-save:disabled { opacity:.4; cursor:not-allowed; }
</style>
</head>
<body>
<header>
  <h1>Photo Watchface</h1>
  <p>Pebble Time Round · 180×180</p>
</header>

<div id="log">ready
</div>

<div class="dropzone" id="dz">
  <input type="file" id="fileInput" accept="image/*">
  <div class="dz-icon">🖼️</div>
  <div class="dz-label">Tap to choose a photo</div>
  <div class="dz-hint">Cropped square, scaled to 180×180, sent as PNG</div>
</div>

<div class="preview-wrap" id="previewWrap">
  <div class="watch-frame"><canvas id="previewCanvas" width="120" height="120"></canvas></div>
  <div class="meta" id="metaText">—</div>
</div>

<div class="prog-wrap" id="progWrap">
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-label" id="progLabel">Processing…</div>
</div>

<div class="btn-row">
  <button class="btn btn-cancel" id="btnCancel">Cancel</button>
  <button class="btn btn-save"   id="btnSave" disabled>Save &amp; Send</button>
</div>

<!-- Working canvas — hidden, full res -->
<canvas id="work" style="display:none" width="180" height="180"></canvas>

<script>
// ── Visible log ───────────────────────────────────────────────────────────
var logEl = document.getElementById('log');
function dbg(msg) {
  console.log('[PF-config] ' + msg);
  logEl.textContent += '\n' + msg;
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Pebble 64-color palette (for dithering to match Pebble Time) ──────────
var PALETTE = (function() {
  var p = [];
  for (var r=0;r<4;r++) for (var g=0;g<4;g++) for (var b=0;b<4;b++)
    p.push({r:r*85, g:g*85, b:b*85});
  return p;
}());
function nearestColor(r,g,b) {
  var best=PALETTE[0], bd=1e9;
  for (var i=0;i<PALETTE.length;i++) {
    var c=PALETTE[i], d=(r-c.r)*(r-c.r)*0.299+(g-c.g)*(g-c.g)*0.587+(b-c.b)*(b-c.b)*0.114;
    if (d<bd){bd=d;best=c;}
  }
  return best;
}
function floydSteinberg(ctx, w, h) {
  var id = ctx.getImageData(0,0,w,h);
  var d  = id.data;
  for (var y=0;y<h;y++) for (var x=0;x<w;x++) {
    var i=4*(y*w+x);
    var c=nearestColor(d[i],d[i+1],d[i+2]);
    var er=d[i]-c.r, eg=d[i+1]-c.g, eb=d[i+2]-c.b;
    d[i]=c.r; d[i+1]=c.g; d[i+2]=c.b;
    function spread(dx,dy,f){
      var ni=4*((y+dy)*w+(x+dx));
      if(x+dx>=0&&x+dx<w&&y+dy>=0&&y+dy<h){d[ni]+=er*f;d[ni+1]+=eg*f;d[ni+2]+=eb*f;}
    }
    spread(1,0,7/16); spread(-1,1,3/16); spread(0,1,5/16); spread(1,1,1/16);
  }
  ctx.putImageData(id,0,0);
}

// ── State ─────────────────────────────────────────────────────────────────
var pngBytes   = null; // Array of byte values ready to send
var currentFile = null;

// ── Helpers ───────────────────────────────────────────────────────────────
function showProg(v,pct,label){
  document.getElementById('progWrap').className='prog-wrap'+(v?' show':'');
  if(v){document.getElementById('progFill').style.width=pct+'%';document.getElementById('progLabel').textContent=label;}
}
function getReturnURL(){
  var q=location.search.substring(1),vars=q.split('&');
  for(var i=0;i<vars.length;i++){var p=vars[i].split('=');if(p[0]==='return_to')return decodeURIComponent(p[1]);}
  return 'pebblejs://close#';
}

// ── Process image ─────────────────────────────────────────────────────────
function processImage(file) {
  currentFile = file;
  pngBytes = null;
  document.getElementById('btnSave').disabled = true;
  showProg(true, 10, 'Loading image…');
  dbg('loading: ' + file.name + ' (' + file.size + ' bytes)');

  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onload = function() {
    URL.revokeObjectURL(url);
    dbg('image: ' + img.width + 'x' + img.height);
    showProg(true, 30, 'Scaling to 180×180…');

    // Scale + centre-crop to 180×180 on hidden work canvas
    var work = document.getElementById('work');
    var wctx = work.getContext('2d');
    var size = Math.min(img.width, img.height);
    wctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 180, 180);

    showProg(true, 55, 'Dithering to 64 colors…');
    setTimeout(function() {
      floydSteinberg(wctx, 180, 180);
      dbg('dither done');

      // Show preview in watch bezel
      var prev = document.getElementById('previewCanvas');
      prev.getContext('2d').drawImage(work, 0,0,180,180, 0,0,120,120);
      document.getElementById('previewWrap').className = 'preview-wrap show';

      showProg(true, 75, 'Encoding PNG…');
      setTimeout(function() {
        // Export as PNG data URL, then extract the raw bytes
        var dataURL = work.toDataURL('image/png');
        dbg('dataURL length: ' + dataURL.length);

        // Strip the data:image/png;base64, prefix and decode base64 → byte array
        var b64 = dataURL.split(',')[1];
        dbg('base64 length: ' + b64.length);

        var bytes = b64ToBytes(b64);
        dbg('PNG bytes: ' + bytes.length);

        pngBytes = bytes;
        document.getElementById('metaText').textContent =
          '180×180 · PNG · ' + (bytes.length / 1024).toFixed(1) + ' KB';
        showProg(false);
        document.getElementById('btnSave').disabled = false;
        dbg('ready — tap Save & Send');
      }, 30);
    }, 30);
  };
  img.onerror = function() { showProg(false); dbg('ERROR: could not load image'); };
  img.src = url;
}

// ── base64 → byte array (browser-native, no btoa needed) ─────────────────
function b64ToBytes(b64) {
  // atob IS available in the phone browser WebView (unlike in PebbleKit JS)
  var bin = atob(b64);
  var arr = new Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

// ── File input / drag-drop ────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function(e) {
  if (e.target.files[0]) processImage(e.target.files[0]);
});
var dz = document.getElementById('dz');
dz.addEventListener('dragover',  function(e) { e.preventDefault(); });
dz.addEventListener('drop', function(e) {
  e.preventDefault();
  if (e.dataTransfer.files[0]) processImage(e.dataTransfer.files[0]);
});

// ── Save: pass bytes back through webviewclosed ───────────────────────────
document.getElementById('btnSave').addEventListener('click', function() {
  if (!pngBytes) { dbg('no bytes yet'); return; }
  dbg('encoding ' + pngBytes.length + ' bytes for response…');
  showProg(true, 90, 'Encoding response…');

  setTimeout(function() {
    var payload = encodeURIComponent(JSON.stringify({
      action: 'photo',
      bytes:  pngBytes   // array of PNG byte values
    }));
    dbg('payload length: ' + payload.length);
    dbg('navigating to close URL…');
    showProg(false);
    document.location = getReturnURL() + payload;
  }, 50);
});

// ── Cancel ────────────────────────────────────────────────────────────────
document.getElementById('btnCancel').addEventListener('click', function() {
  dbg('cancelled');
  document.location = getReturnURL() + encodeURIComponent(JSON.stringify({ action: 'cancel' }));
});
</script>
</body>
</html>
