<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Photo Watchface</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8c84a;
    --accent2: #4ae8a0;
    --danger: #e84a4a;
    --text: #f0ede6;
    --muted: #666;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  header h1 { font-family: var(--mono); font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
  header p  { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .url-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--muted); }

  .btn {
    padding: 10px 16px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary          { background: var(--accent);  color: #0e0e0e; }
  .btn-primary:hover    { background: #f5d84f; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost            { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover      { border-color: var(--accent); color: var(--accent); }
  .btn-send             { background: var(--accent2); color: #0e0e0e; }
  .btn-send:hover       { background: #5af5b0; }
  .btn-send:disabled    { opacity: 0.35; cursor: not-allowed; }

  .preview-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    animation: fadeIn 0.2s ease;
  }
  .preview-area.show { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .watch-bezel {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4a3a1a, #7a5c2e, #4a3a1a);
    padding: 5px;
    box-shadow: 0 0 0 1px #2a2010, 0 8px 32px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .watch-screen {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #000;
    overflow: hidden;
  }
  .watch-screen canvas { width: 100%; height: 100%; display: block; }

  .preview-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .prog-wrap { display: none; margin-bottom: 12px; }
  .prog-wrap.show { display: block; }
  .prog-track {
    height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden; margin-bottom: 6px;
  }
  .prog-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; width: 0; transition: width 0.2s;
  }
  .prog-label { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  .action-row { display: flex; gap: 8px; }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-family: var(--mono);
    font-size: 12px; line-height: 1.8;
  }
  .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
  .image-list { display: flex; flex-direction: column; gap: 10px; }
  .image-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; display: flex; align-items: center;
    gap: 12px; padding: 10px; transition: border-color 0.15s;
  }
  .image-card:hover { border-color: #444; }
  .image-card.active-card { border-color: var(--accent2); }
  .card-thumb {
    width: 52px; height: 52px; border-radius: 50%;
    border: 2px solid #4a3a1a; background: #000;
    overflow: hidden; flex-shrink: 0;
  }
  .card-thumb canvas { width: 100%; height: 100%; display: block; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-family: var(--mono); font-size: 13px; font-weight: 500; }
  .card-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
  .card-active-badge { font-family: var(--mono); font-size: 9px; color: var(--accent2); margin-top: 3px; }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .card-btn {
    padding: 6px 10px; border-radius: 6px;
    font-family: var(--mono); font-size: 11px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .card-btn-send { background: var(--accent2); color: #0e0e0e; }
  .card-btn-send:hover { background: #5af5b0; }
  .card-btn-del { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .card-btn-del:hover { color: var(--danger); border-color: var(--danger); }

  .transfer-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(14,14,14,0.94); z-index: 100;
    flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; padding: 24px;
  }
  .transfer-overlay.show { display: flex; }
  .transfer-title { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--accent2); }
  .transfer-prog-track {
    width: 100%; max-width: 280px; height: 6px;
    background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .transfer-prog-fill {
    height: 100%; background: var(--accent2);
    border-radius: 3px; width: 0; transition: width 0.2s;
  }
  .transfer-label { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; }

  #log {
    background: #050505; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    font-family: var(--mono); font-size: 10px; color: #0c0;
    max-height: 300px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
  }

  .chunk-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
    padding: 24px;
    text-align: center;
  }
  .chunk-screen.show { display: flex; }
  .chunk-title { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--accent2); }
  .chunk-sub   { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .chunk-prog-track {
    width: 100%; max-width: 260px; height: 5px;
    background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .chunk-prog-fill {
    height: 100%; background: var(--accent2);
    border-radius: 3px; width: 0; transition: width 0.3s;
  }

  canvas#work { display: none; }
</style>
</head>
<body>

<div class="chunk-screen" id="chunkScreen">
  <div class="chunk-title">&#x1F4E1; Transferring Image</div>
  <div class="chunk-prog-track">
    <div class="chunk-prog-fill" id="chunkProgFill"></div>
  </div>
  <div class="chunk-sub" id="chunkSub">Reading chunk&#x2026;</div>
</div>

<div id="normalUI">
  <header>
    <div class="header-icon">&#x231A;</div>
    <div>
      <h1>PHOTO WATCHFACE</h1>
      <p>Pebble Time Round · 180×180 v0.20 · 64 colors</p>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" id="tab-new"   onclick="switchTab('new')">NEW IMAGE</div>
    <div class="tab"        id="tab-saved" onclick="switchTab('saved')">SAVED <span id="saved-count"></span></div>
    <div class="tab"        id="tab-log"   onclick="switchTab('log')">LOG</div>
  </div>

  <div class="panel active" id="panel-new">
    <div class="section-label">Image URL</div>
    <div class="input-row">
      <input class="url-input" id="urlInput" type="url" placeholder="https://example.com/photo.png">
      <button class="btn btn-primary" onclick="loadURL()">Load</button>
    </div>

    <div class="preview-area" id="previewArea">
      <div class="watch-bezel">
        <div class="watch-screen">
          <canvas id="previewCanvas" width="130" height="130"></canvas>
        </div>
      </div>
      <div class="preview-meta" id="previewMeta">—</div>
    </div>

    <div class="prog-wrap" id="progWrap">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-label" id="progLabel">Processing…</div>
    </div>

    <div class="action-row" id="actionRow" style="display:none">
      <button class="btn btn-send" id="btnSend" onclick="saveAndSend()" disabled>
        Save &amp; Send to Watch
      </button>
    </div>
  </div>

  <div class="panel" id="panel-saved">
    <div id="imageList"></div>
  </div>

  <div class="panel" id="panel-log">
    <div id="log">ready
</div>
  </div>

  <div class="transfer-overlay" id="transferOverlay">
    <div class="transfer-title">&#x1F4E1; SENDING KEY TO WATCH</div>
    <div class="transfer-prog-track">
      <div class="transfer-prog-fill" id="transferFill"></div>
    </div>
    <div class="transfer-label" id="transferLabel">Preparing…</div>
  </div>
</div>

<canvas id="work" width="180" height="180"></canvas>

<script>
// ════════════════════════════════════════════════════════════════════════════
// GLOBAL HELPERS — available in both chunk mode and normal mode
// ════════════════════════════════════════════════════════════════════════════

function getParam(name) {
  var q = location.search.substring(1).split('&');
  for (var i = 0; i < q.length; i++) {
    var p = q[i].split('=');
    if (decodeURIComponent(p[0]) === name) {
      return p.length > 1 ? decodeURIComponent(p[1]) : '';
    }
  }
  return null;
}

function getReturnURL() {
  var q = location.search.substring(1).split('&');
  for (var i = 0; i < q.length; i++) {
    var p = q[i].split('=');
    if (decodeURIComponent(p[0]) === 'return_to') return decodeURIComponent(p[1]);
  }
  return 'pebblejs://close#';
}

// ── CRC32 ──────────────────────────────────────────────────────────────────
var CRC_TABLE = (function() {
  var t = [];
  for (var i = 0; i < 256; i++) {
    var c = i;
    for (var j = 0; j < 8; j++) {
      c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    }
    t[i] = c;
  }
  return t;
}());

function crc32(arr, start, len) {
  var crc = 0xFFFFFFFF;
  for (var i = start; i < start + len; i++) {
    crc = CRC_TABLE[(crc ^ arr[i]) & 0xFF] ^ (crc >>> 8);
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// ── Adler32 ────────────────────────────────────────────────────────────────
function adler32(arr) {
  var s1 = 1, s2 = 0;
  for (var i = 0; i < arr.length; i++) {
    s1 = (s1 + arr[i]) % 65521;
    s2 = (s2 + s1)     % 65521;
  }
  return (s2 << 16) | s1;
}

// ── Write uint32 big-endian ────────────────────────────────────────────────
function writeU32(arr, pos, val) {
  arr[pos]   = (val >>> 24) & 0xFF;
  arr[pos+1] = (val >>> 16) & 0xFF;
  arr[pos+2] = (val >>>  8) & 0xFF;
  arr[pos+3] =  val         & 0xFF;
}

// ── PNG chunk builder ──────────────────────────────────────────────────────
// Use explicit char codes — avoid charCodeAt for old WebView compat
var PNG_TYPE_BYTES = {
  'IHDR': [73,72,68,82],
  'PLTE': [80,76,84,69],
  'IDAT': [73,68,65,84],
  'IEND': [73,69,78,68]
};

function pngChunk(type, data) {
  var typeBytes = PNG_TYPE_BYTES[type];
  var len   = data.length;
  var chunk = new Array(4 + 4 + len + 4);

  writeU32(chunk, 0, len);
  chunk[4] = typeBytes[0]; chunk[5] = typeBytes[1];
  chunk[6] = typeBytes[2]; chunk[7] = typeBytes[3];
  for (var i = 0; i < len; i++) chunk[8 + i] = data[i];
  var crc = crc32(chunk, 4, 4 + len);
  writeU32(chunk, 8 + len, crc);
  return chunk;
}

// ── zlib store (deflate type 0 — no compression) ───────────────────────────
function zlibStore(raw) {
  var BLOCK    = 65535;
  var deflated = [];

  for (var offset = 0; offset < raw.length; offset += BLOCK) {
    var slice   = raw.slice(offset, offset + BLOCK);
    var len     = slice.length;
    var isFinal = (offset + BLOCK >= raw.length) ? 1 : 0;
    var nlen    = (~len) & 0xFFFF;

    deflated.push(isFinal);
    deflated.push(len  & 0xFF);
    deflated.push((len >> 8) & 0xFF);
    deflated.push(nlen & 0xFF);
    deflated.push((nlen >> 8) & 0xFF);
    for (var i = 0; i < slice.length; i++) deflated.push(slice[i]);
  }

  // zlib header 0x78 0x01, then deflate blocks, then adler32
  var adler = adler32(raw);
  var zlib  = [0x78, 0x01].concat(deflated);
  zlib.push((adler >>> 24) & 0xFF);
  zlib.push((adler >>> 16) & 0xFF);
  zlib.push((adler >>>  8) & 0xFF);
  zlib.push( adler         & 0xFF);
  return zlib;
}

// ── Build 8-bit indexed PNG ────────────────────────────────────────────────
function buildIndexedPNG(ctx, w, h) {
  // Pebble 64-color palette
  var palette = [];
  for (var r = 0; r < 4; r++) {
    for (var g = 0; g < 4; g++) {
      for (var b = 0; b < 4; b++) {
        palette.push([r*85, g*85, b*85]);
      }
    }
  }

  // Build lookup map: "R,G,B" → index
  var palMap = {};
  for (var p = 0; p < palette.length; p++) {
    palMap[palette[p][0] + ',' + palette[p][1] + ',' + palette[p][2]] = p;
  }

  // Raw scanline data: filter byte (0) + one index byte per pixel
  var id      = ctx.getImageData(0, 0, w, h);
  var pixels  = id.data;
  var rawData = [];

  for (var row = 0; row < h; row++) {
    rawData.push(0); // filter type: None
    for (var col = 0; col < w; col++) {
      var px  = (row * w + col) * 4;
      var key = pixels[px] + ',' + pixels[px+1] + ',' + pixels[px+2];
      rawData.push(palMap[key] !== undefined ? palMap[key] : 0);
    }
  }

  // IHDR: width, height, 8-bit depth, color type 3 (indexed)
  var ihdr = new Array(13);
  writeU32(ihdr, 0, w);
  writeU32(ihdr, 4, h);
  ihdr[8]=8; ihdr[9]=3; ihdr[10]=0; ihdr[11]=0; ihdr[12]=0;

  // PLTE: R G B per entry
  var plte = [];
  for (var pi = 0; pi < palette.length; pi++) {
    plte.push(palette[pi][0]);
    plte.push(palette[pi][1]);
    plte.push(palette[pi][2]);
  }

  // IDAT: zlib-wrapped scanlines
  var idat = zlibStore(rawData);

  // Assemble: signature + chunks
  var sig = [137, 80, 78, 71, 13, 10, 26, 10];
  return sig
    .concat(pngChunk('IHDR', ihdr))
    .concat(pngChunk('PLTE', plte))
    .concat(pngChunk('IDAT', idat))
    .concat(pngChunk('IEND', []));
}

// ── Manual base64 encode (no btoa in old WebView) ─────────────────────────
var B64_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';

function bytesToBase64(bytes) {
  var b64 = '';
  for (var i = 0; i < bytes.length; i += 3) {
    var a = bytes[i];
    var b = i+1 < bytes.length ? bytes[i+1] : 0;
    var c = i+2 < bytes.length ? bytes[i+2] : 0;
    b64 += B64_CHARS[(a >> 2) & 0x3F];
    b64 += B64_CHARS[((a & 0x3) << 4) | ((b >> 4) & 0xF)];
    b64 += i+1 < bytes.length ? B64_CHARS[((b & 0xF) << 2) | ((c >> 6) & 0x3)] : '=';
    b64 += i+2 < bytes.length ? B64_CHARS[c & 0x3F] : '=';
  }
  return b64;
}

// ════════════════════════════════════════════════════════════════════════════
// CHUNK MODE
// Detected via ?action=get_chunk in URL — skips all normal UI
// ════════════════════════════════════════════════════════════════════════════
var IS_CHUNK_MODE = (getParam('action') === 'get_chunk');

if (IS_CHUNK_MODE) {
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('normalUI').style.display = 'none';
    document.getElementById('chunkScreen').className  = 'chunk-screen show';

    var slot      = parseInt(getParam('slot'),   10);
    var offset    = parseInt(getParam('offset'), 10);
    var CHUNK     = 3496; // multiple of 4 for base64 alignment
    var returnURL = getReturnURL();

    document.getElementById('chunkSub').textContent =
      'slot ' + slot + '  offset ' + offset;

    var images, item;
    try {
      images = JSON.parse(localStorage.getItem('pf_images') || '{}');
      item   = images[slot];
    } catch(e) { item = null; }

    if (!item || !item.dataURL) {
      document.location = returnURL +
        encodeURIComponent(JSON.stringify({
          action: 'chunk_error', slot: slot, reason: 'not_found'
        }));
      return;
    }

    var b64   = item.dataURL.split(',')[1];
    var total = b64.length;
    var chunk = b64.substring(offset, offset + CHUNK);
    var pct   = Math.min(100, Math.round(((offset + chunk.length) / total) * 100));

    document.getElementById('chunkProgFill').style.width = pct + '%';
    document.getElementById('chunkSub').textContent =
      'slot ' + slot + '  ' + (offset + chunk.length) + '/' + total + ' (' + pct + '%)';

    setTimeout(function() {
      document.location = returnURL +
        encodeURIComponent(JSON.stringify({
          action: 'chunk',
          slot:   slot,
          offset: offset,
          total:  total,
          data:   chunk
        }));
    }, 150);
  });
}

// ════════════════════════════════════════════════════════════════════════════
// NORMAL UI MODE
// ════════════════════════════════════════════════════════════════════════════
if (!IS_CHUNK_MODE) {

var logEl = document.getElementById('log');
function dbg(msg) {
  console.log('[PF] ' + msg);
  if (logEl) { logEl.textContent += '\n' + msg; logEl.scrollTop = logEl.scrollHeight; }
}
dbg('Normal UI mode');
dbg('Pebble: ' + (typeof Pebble !== 'undefined'));

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'saved') renderSavedList();
}

// ── Pebble 64-color palette + Floyd-Steinberg ──────────────────────────────
var PALETTE = (function() {
  var p = [];
  for (var r=0;r<4;r++) for (var g=0;g<4;g++) for (var b=0;b<4;b++)
    p.push({r:r*85, g:g*85, b:b*85});
  return p;
}());

function nearestColor(r,g,b) {
  var best=PALETTE[0], bd=1e9;
  for (var i=0;i<PALETTE.length;i++) {
    var c=PALETTE[i];
    var d=(r-c.r)*(r-c.r)*0.299+(g-c.g)*(g-c.g)*0.587+(b-c.b)*(b-c.b)*0.114;
    if(d<bd){bd=d;best=c;}
  }
  return best;
}

function floydSteinberg(ctx, w, h) {
  var id=ctx.getImageData(0,0,w,h), d=id.data;
  for (var y=0;y<h;y++) for (var x=0;x<w;x++) {
    var i=4*(y*w+x);
    var c=nearestColor(d[i],d[i+1],d[i+2]);
    var er=d[i]-c.r, eg=d[i+1]-c.g, eb=d[i+2]-c.b;
    d[i]=c.r; d[i+1]=c.g; d[i+2]=c.b;
    function spread(dx,dy,f){
      if(x+dx<0||x+dx>=w||y+dy<0||y+dy>=h)return;
      var ni=4*((y+dy)*w+(x+dx));
      d[ni]+=er*f; d[ni+1]+=eg*f; d[ni+2]+=eb*f;
    }
    spread(1,0,7/16); spread(-1,1,3/16); spread(0,1,5/16); spread(1,1,1/16);
  }
  ctx.putImageData(id,0,0);
}

// ── State ──────────────────────────────────────────────────────────────────
var currentDataURL = null;
var currentBytes   = null;

// ── localStorage helpers ───────────────────────────────────────────────────
function getImages() {
  try { return JSON.parse(localStorage.getItem('pf_images') || '{}'); }
  catch(e) { return {}; }
}
function setImages(obj) { localStorage.setItem('pf_images', JSON.stringify(obj)); }
function getNextSlot() { return parseInt(localStorage.getItem('pf_next_slot') || '0', 10); }
function bumpNextSlot() {
  var n = getNextSlot();
  localStorage.setItem('pf_next_slot', String(n + 1));
  return n;
}
function getActiveSlot() {
  var v = localStorage.getItem('pf_active_slot');
  return v !== null ? parseInt(v, 10) : -1;
}
function setActiveSlot(slot) { localStorage.setItem('pf_active_slot', String(slot)); }
function updateSavedCount() {
  var n = Object.keys(getImages()).length;
  document.getElementById('saved-count').textContent = n > 0 ? '(' + n + ')' : '';
}

// ── Progress bar ───────────────────────────────────────────────────────────
function showProg(show, pct, label) {
  document.getElementById('progWrap').className = 'prog-wrap' + (show ? ' show' : '');
  if (show) {
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progLabel').textContent = label;
  }
}

// ── Load image from URL ────────────────────────────────────────────────────
function loadURL() {
  var url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  currentDataURL = null;
  currentBytes   = null;
  document.getElementById('btnSend').disabled = true;
  document.getElementById('actionRow').style.display = 'none';
  document.getElementById('previewArea').className = 'preview-area';
  showProg(true, 5, 'Fetching image…');
  dbg('fetching: ' + url);

  var img = new Image();
  img.onload = function() {
    dbg('loaded: ' + img.width + 'x' + img.height);
    processImage(img);
  };
  img.onerror = function() {
    dbg('img tag failed, trying XHR…');
    loadViaXHR(url);
  };
  img.src = url;
}

function loadViaXHR(url) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.responseType = 'blob';
  xhr.onload = function() {
    if (xhr.status === 200) {
      var blobURL = URL.createObjectURL(xhr.response);
      var img = new Image();
      img.onload = function() {
        URL.revokeObjectURL(blobURL);
        dbg('XHR ok: ' + img.width + 'x' + img.height);
        processImage(img);
      };
      img.onerror = function() { showProg(false); dbg('ERROR: XHR blob failed'); };
      img.src = blobURL;
    } else {
      showProg(false);
      dbg('ERROR: XHR status ' + xhr.status);
    }
  };
  xhr.onerror = function() { showProg(false); dbg('ERROR: XHR network error'); };
  xhr.send();
}

// ── Process: scale → dither → indexed PNG ─────────────────────────────────
function processImage(img) {
  showProg(true, 25, 'Scaling to 180x180…');
  var work = document.getElementById('work');
  var wctx = work.getContext('2d');
  var size = Math.min(img.width, img.height);
  wctx.clearRect(0,0,180,180);
  wctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0,0,180,180);

  showProg(true, 50, 'Dithering to 64 colors…');
  setTimeout(function() {
    floydSteinberg(wctx, 180, 180);

    // Update watch preview
    document.getElementById('previewCanvas')
      .getContext('2d').drawImage(work, 0,0,180,180, 0,0,130,130);
    document.getElementById('previewArea').className = 'preview-area show';

    showProg(true, 75, 'Building indexed PNG…');
    setTimeout(function() {
      try {
        // Build 8-bit indexed PNG — much smaller than 32-bit RGBA from toDataURL
        var pngBytes = buildIndexedPNG(wctx, 180, 180);
        var b64      = bytesToBase64(pngBytes);

        currentBytes   = pngBytes;
        currentDataURL = 'data:image/png;base64,' + b64;

        dbg('indexed PNG: ' + pngBytes.length + ' bytes (' + (pngBytes.length/1024).toFixed(1) + ' KB)');
        document.getElementById('previewMeta').textContent =
          '180x180  8-bit indexed  64 colors\n' +
          (pngBytes.length/1024).toFixed(1) + ' KB  tap Save & Send';

        showProg(false);
        document.getElementById('btnSend').disabled = false;
        document.getElementById('actionRow').style.display = 'flex';
      } catch(err) {
        showProg(false);
        dbg('ERROR building PNG: ' + err);
      }
    }, 30);
  }, 30);
}

// ── Save & Send ────────────────────────────────────────────────────────────
function saveAndSend() {
  if (!currentDataURL || !currentBytes) { dbg('nothing to save'); return; }

  var slot = bumpNextSlot();
  var key  = 'image_index_' + slot;
  var images = getImages();
  images[slot] = {
    key:     key,
    dataURL: currentDataURL,
    size:    currentBytes.length,
    savedAt: new Date().toLocaleDateString()
  };
  setImages(images);
  setActiveSlot(slot);
  updateSavedCount();
  dbg('saved as ' + key + ' (slot ' + slot + ')');

  document.location = getReturnURL() +
    encodeURIComponent(JSON.stringify({ action: 'send', slot: slot }));
}

// ── Re-send a saved image ──────────────────────────────────────────────────
function sendSavedSlot(slot) {
  setActiveSlot(slot);
  dbg('re-sending slot ' + slot);
  document.location = getReturnURL() +
    encodeURIComponent(JSON.stringify({ action: 'send', slot: slot }));
}

// ── Saved list ─────────────────────────────────────────────────────────────
function renderSavedList() {
  var images     = getImages();
  var activeSlot = getActiveSlot();
  var slots      = Object.keys(images);
  var el         = document.getElementById('imageList');
  updateSavedCount();

  if (slots.length === 0) {
    el.innerHTML =
      '<div class="empty-state"><div class="empty-icon">&#x1F5BC;</div>' +
      'No saved images yet.<br>Load an image on the New Image tab.</div>';
    return;
  }

  el.innerHTML = '';
  slots.slice().reverse().forEach(function(slot) {
    var item     = images[slot];
    var isActive = parseInt(slot, 10) === activeSlot;

    var card = document.createElement('div');
    card.className = 'image-card' + (isActive ? ' active-card' : '');

    var thumbDiv = document.createElement('div');
    thumbDiv.className = 'card-thumb';
    var thumbCanvas = document.createElement('canvas');
    thumbCanvas.width = 52; thumbCanvas.height = 52;
    thumbDiv.appendChild(thumbCanvas);
    var tImg = new Image();
    tImg.onload = function() {
      thumbCanvas.getContext('2d').drawImage(tImg, 0,0,180,180, 0,0,52,52);
    };
    tImg.src = item.dataURL;

    var info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML =
      '<div class="card-name">' + escHtml(item.key) + '</div>' +
      '<div class="card-meta">' + (item.size/1024).toFixed(1) + ' KB  ' + item.savedAt + '</div>' +
      (isActive ? '<div class="card-active-badge">on watch</div>' : '');

    var actions = document.createElement('div');
    actions.className = 'card-actions';

    var sendBtn = document.createElement('button');
    sendBtn.className = 'card-btn card-btn-send';
    sendBtn.textContent = 'Send';
    sendBtn.onclick = (function(s) { return function() { sendSavedSlot(s); }; })(parseInt(slot,10));

    var delBtn = document.createElement('button');
    delBtn.className = 'card-btn card-btn-del';
    delBtn.textContent = 'X';
    delBtn.onclick = (function(s) { return function() { deleteImage(s); }; })(slot);

    actions.appendChild(sendBtn);
    actions.appendChild(delBtn);
    card.appendChild(thumbDiv);
    card.appendChild(info);
    card.appendChild(actions);
    el.appendChild(card);
  });
}

function deleteImage(slot) {
  var images = getImages();
  delete images[slot];
  setImages(images);
  if (getActiveSlot() === parseInt(slot, 10)) localStorage.removeItem('pf_active_slot');
  renderSavedList();
  dbg('deleted slot ' + slot);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Transfer overlay ───────────────────────────────────────────────────────
function showTransfer(show, pct, label) {
  document.getElementById('transferOverlay').className =
    'transfer-overlay' + (show ? ' show' : '');
  if (show) {
    document.getElementById('transferFill').style.width = pct + '%';
    document.getElementById('transferLabel').textContent = label || '';
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
updateSavedCount();
document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadURL();
});

} // end if (!IS_CHUNK_MODE)
</script>
