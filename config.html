<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Photo Watchface</title>
<style>
  :root { --bg:#1a1a1a; --surface:#242424; --border:#383838; --accent:#c8a55a; --text:#f0ede6; --muted:#888; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,sans-serif; font-size:15px; padding:0 0 40px; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 20px; }
  header h1 { font-size:17px; font-weight:600; }
  header p  { font-size:12px; color:var(--muted); margin-top:2px; }
  #log { margin:10px 16px; background:#0a0a0a; border:1px solid #333; border-radius:8px; padding:8px 10px; font-family:monospace; font-size:11px; color:#0f0; max-height:140px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; }
  .dropzone { margin:10px 16px; border:2px dashed var(--border); border-radius:10px; padding:24px 16px; text-align:center; cursor:pointer; position:relative; }
  .dropzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .dz-icon { font-size:28px; margin-bottom:6px; }
  .dz-label { font-size:14px; }
  .dz-hint  { font-size:12px; color:var(--muted); margin-top:4px; }
  .preview-wrap { display:none; flex-direction:column; align-items:center; gap:10px; padding:10px 16px; }
  .preview-wrap.show { display:flex; }
  .watch-frame { width:120px; height:120px; border-radius:50%; border:4px solid #7a5c2e; box-shadow:0 0 0 2px #c8a55a; overflow:hidden; background:#000; }
  .watch-frame canvas { width:100%; height:100%; display:block; }
  .meta { font-size:11px; color:var(--muted); text-align:center; }
  .prog-wrap { display:none; padding:0 16px 10px; }
  .prog-wrap.show { display:block; }
  .prog-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .prog-fill { height:100%; background:var(--accent); border-radius:3px; width:0; transition:width .2s; }
  .prog-label { font-size:11px; color:var(--muted); margin-top:5px; }
  .btn-row { display:flex; gap:10px; padding:12px 16px; }
  .btn { flex:1; padding:12px; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; border:none; }
  .btn-cancel { background:var(--surface); color:var(--text); border:1px solid var(--border); }
  .btn-send   { background:var(--accent); color:#1a1100; }
  .btn-send:disabled { opacity:.4; cursor:not-allowed; }
</style>
</head>
<body>
<header>
  <h1>Photo Watchface</h1>
  <p>Pebble Time Round · 180×180</p>
</header>

<div id="log">ready
</div>

<div class="dropzone" id="dz">
  <input type="file" id="fileInput" accept="image/*">
  <div class="dz-icon">🖼️</div>
  <div class="dz-label">Tap to choose a photo</div>
  <div class="dz-hint">Scaled to 180×180, dithered, sent as PNG over Bluetooth</div>
</div>

<div class="preview-wrap" id="previewWrap">
  <div class="watch-frame"><canvas id="previewCanvas" width="120" height="120"></canvas></div>
  <div class="meta" id="metaText">—</div>
</div>

<div class="prog-wrap" id="progWrap">
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-label" id="progLabel">Processing…</div>
</div>

<div class="btn-row">
  <button class="btn btn-cancel" id="btnCancel">Cancel</button>
  <button class="btn btn-send"   id="btnSend" disabled>Send to Watch</button>
</div>

<canvas id="work" style="display:none" width="180" height="180"></canvas>

<script>
// ── Log ───────────────────────────────────────────────────────────────────
var logEl = document.getElementById('log');
function dbg(msg) {
  console.log('[PF] ' + msg);
  logEl.textContent += '\n' + msg;
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Check Pebble object ───────────────────────────────────────────────────
dbg('Pebble available: ' + (typeof Pebble !== 'undefined'));
if (typeof Pebble !== 'undefined') {
  dbg('Pebble.sendAppMessage: ' + (typeof Pebble.sendAppMessage));
}

// ── Pebble 64-color palette ───────────────────────────────────────────────
var PALETTE = (function() {
  var p = [];
  for (var r=0;r<4;r++) for (var g=0;g<4;g++) for (var b=0;b<4;b++)
    p.push({r:r*85, g:g*85, b:b*85});
  return p;
}());

function nearestColor(r,g,b) {
  var best=PALETTE[0], bd=1e9;
  for (var i=0;i<PALETTE.length;i++) {
    var c=PALETTE[i];
    var d=(r-c.r)*(r-c.r)*0.299+(g-c.g)*(g-c.g)*0.587+(b-c.b)*(b-c.b)*0.114;
    if (d<bd){bd=d;best=c;}
  }
  return best;
}

function floydSteinberg(ctx, w, h) {
  var id=ctx.getImageData(0,0,w,h), d=id.data;
  for (var y=0;y<h;y++) for (var x=0;x<w;x++) {
    var i=4*(y*w+x);
    var c=nearestColor(d[i],d[i+1],d[i+2]);
    var er=d[i]-c.r, eg=d[i+1]-c.g, eb=d[i+2]-c.b;
    d[i]=c.r; d[i+1]=c.g; d[i+2]=c.b;
    function spread(dx,dy,f){
      if(x+dx<0||x+dx>=w||y+dy<0||y+dy>=h) return;
      var ni=4*((y+dy)*w+(x+dx));
      d[ni]+=er*f; d[ni+1]+=eg*f; d[ni+2]+=eb*f;
    }
    spread(1,0,7/16); spread(-1,1,3/16); spread(0,1,5/16); spread(1,1,1/16);
  }
  ctx.putImageData(id,0,0);
}

// ── State ─────────────────────────────────────────────────────────────────
var pngBytes    = null;
var currentFile = null;
var CHUNK_SIZE  = 128; // conservative; pebble-faces uses app_message_inbox_size_maximum()

// ── Helpers ───────────────────────────────────────────────────────────────
function showProg(v, pct, label) {
  document.getElementById('progWrap').className = 'prog-wrap' + (v ? ' show' : '');
  if (v) {
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progLabel').textContent = label;
  }
}

function getReturnURL() {
  var q=location.search.substring(1), vars=q.split('&');
  for (var i=0;i<vars.length;i++) {
    var p=vars[i].split('=');
    if (p[0]==='return_to') return decodeURIComponent(p[1]);
  }
  return 'pebblejs://close#';
}

// ── Process image ─────────────────────────────────────────────────────────
function processImage(file) {
  currentFile = file;
  pngBytes = null;
  document.getElementById('btnSend').disabled = true;
  showProg(true, 10, 'Loading image…');
  dbg('loading: ' + file.name + ' (' + file.size + ' B)');

  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onload = function() {
    URL.revokeObjectURL(url);
    dbg('image: ' + img.width + 'x' + img.height);
    showProg(true, 30, 'Scaling to 180×180…');

    var work = document.getElementById('work');
    var wctx = work.getContext('2d');
    var size = Math.min(img.width, img.height);
    wctx.clearRect(0, 0, 180, 180);
    wctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 180, 180);

    showProg(true, 55, 'Dithering to 64 colors…');
    setTimeout(function() {
      floydSteinberg(wctx, 180, 180);

      // Show dithered preview
      document.getElementById('previewCanvas')
        .getContext('2d').drawImage(work, 0,0,180,180, 0,0,120,120);
      document.getElementById('previewWrap').className = 'preview-wrap show';

      showProg(true, 75, 'Encoding PNG…');
      setTimeout(function() {
        var dataURL = work.toDataURL('image/png');
        var b64 = dataURL.split(',')[1];
        // atob is available in the phone browser WebView
        var bin = atob(b64);
        var bytes = new Array(bin.length);
        for (var i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);

        pngBytes = bytes;
        dbg('PNG encoded: ' + bytes.length + ' bytes');
        document.getElementById('metaText').textContent =
          '180×180 · ' + (bytes.length/1024).toFixed(1) + ' KB PNG · ready to send';
        showProg(false);
        document.getElementById('btnSend').disabled = false;
      }, 30);
    }, 30);
  };
  img.onerror = function() { showProg(false); dbg('ERROR: image load failed'); };
  img.src = url;
}

// ── File input ────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', function(e) {
  if (e.target.files[0]) processImage(e.target.files[0]);
});
var dz = document.getElementById('dz');
dz.addEventListener('dragover', function(e) { e.preventDefault(); });
dz.addEventListener('drop', function(e) {
  e.preventDefault();
  if (e.dataTransfer.files[0]) processImage(e.dataTransfer.files[0]);
});

// ── Send to watch directly from config page ───────────────────────────────
// The config page WebView has access to the Pebble object — we don't need to
// go through webviewclosed at all. We replicate the pebble-faces protocol:
//   NETDL_BEGIN(total) → NETDL_DATA(chunk)... → NETDL_END(total) → close
document.getElementById('btnSend').addEventListener('click', function() {
  if (!pngBytes) { dbg('no bytes'); return; }

  if (typeof Pebble === 'undefined' || typeof Pebble.sendAppMessage !== 'function') {
    dbg('ERROR: Pebble.sendAppMessage not available in this context');
    dbg('Are you viewing this page outside the Pebble app?');
    return;
  }

  document.getElementById('btnSend').disabled = true;
  var bytes = pngBytes;
  var total = bytes.length;
  dbg('starting transfer: ' + total + ' bytes, chunkSize=' + CHUNK_SIZE);
  showProg(true, 0, 'Sending…');

  // Step 1: BEGIN
  Pebble.sendAppMessage(
    { 'NETDL_BEGIN': total },
    function() {
      dbg('NETDL_BEGIN ack');
      sendChunk(0);
    },
    function(e) {
      dbg('NETDL_BEGIN nack: ' + e);
      showProg(false);
      document.getElementById('btnSend').disabled = false;
    }
  );

  function sendChunk(offset) {
    if (offset >= total) {
      // Step 3: END
      Pebble.sendAppMessage(
        { 'NETDL_END': total },
        function() {
          dbg('NETDL_END ack — done!');
          showProg(true, 100, 'Done! Closing…');
          setTimeout(function() {
            document.location = getReturnURL() +
              encodeURIComponent(JSON.stringify({ action: 'done' }));
          }, 800);
        },
        function(e) { dbg('NETDL_END nack: ' + e); showProg(false); }
      );
      return;
    }

    var slice = bytes.slice(offset, offset + CHUNK_SIZE);
    var pct   = Math.round((offset / total) * 100);
    showProg(true, pct, 'Sending… ' + pct + '% (' + offset + '/' + total + ' bytes)');

    Pebble.sendAppMessage(
      { 'NETDL_DATA': slice },
      function() { sendChunk(offset + CHUNK_SIZE); },
      function(e) {
        dbg('chunk nack at ' + offset + ': ' + e + ' — retrying');
        Pebble.sendAppMessage(
          { 'NETDL_DATA': slice },
          function() { sendChunk(offset + CHUNK_SIZE); },
          function(e2) { dbg('chunk retry failed: ' + e2); showProg(false); }
        );
      }
    );
  }
});

// ── Cancel ────────────────────────────────────────────────────────────────
document.getElementById('btnCancel').addEventListener('click', function() {
  dbg('cancelled');
  document.location = getReturnURL() +
    encodeURIComponent(JSON.stringify({ action: 'cancel' }));
});
</script>
</body>
</html>
