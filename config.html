<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Photo Watchface</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8c84a;
    --accent2: #4ae8a0;
    --danger: #e84a4a;
    --text: #f0ede6;
    --muted: #666;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  header h1 { font-family: var(--mono); font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }
  header p  { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Panels ── */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* ── URL Input section ── */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .url-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--muted); }

  .btn {
    padding: 10px 16px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary   { background: var(--accent); color: #0e0e0e; }
  .btn-primary:hover { background: #f5d84f; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-send   { background: var(--accent2); color: #0e0e0e; }
  .btn-send:hover { background: #5af5b0; }
  .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Preview area ── */
  .preview-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    animation: fadeIn 0.2s ease;
  }
  .preview-area.show { display: flex; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .watch-bezel {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4a3a1a, #7a5c2e, #4a3a1a);
    padding: 5px;
    box-shadow: 0 0 0 1px #2a2010, 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .watch-screen {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #000;
    overflow: hidden;
    position: relative;
  }
  .watch-screen canvas { width: 100%; height: 100%; display: block; }

  .preview-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  /* ── Progress ── */
  .prog-wrap { display: none; margin-bottom: 12px; }
  .prog-wrap.show { display: block; }
  .prog-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0;
    transition: width 0.2s;
  }
  .prog-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  /* ── Action row ── */
  .action-row {
    display: flex;
    gap: 8px;
  }

  /* ── Save row ── */
  .save-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    display: none;
  }
  .save-row.show { display: flex; }
  .save-name-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .save-name-input:focus { border-color: var(--accent2); }
  .save-name-input::placeholder { color: var(--muted); }

  /* ── Image list ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.8;
  }
  .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }

  .image-list { display: flex; flex-direction: column; gap: 10px; }

  .image-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    transition: border-color 0.15s;
  }
  .image-card:hover { border-color: #444; }

  .card-thumb {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid #4a3a1a;
    background: #000;
    overflow: hidden;
    flex-shrink: 0;
  }
  .card-thumb canvas { width: 100%; height: 100%; display: block; }

  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .card-btn {
    padding: 6px 10px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .card-btn-send { background: var(--accent2); color: #0e0e0e; }
  .card-btn-send:hover { background: #5af5b0; }
  .card-btn-del  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .card-btn-del:hover  { color: var(--danger); border-color: var(--danger); }

  /* ── Transfer overlay ── */
  .transfer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(14,14,14,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
  }
  .transfer-overlay.show { display: flex; }
  .transfer-title {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent2);
  }
  .transfer-prog-track {
    width: 100%;
    max-width: 280px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .transfer-prog-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 3px;
    width: 0;
    transition: width 0.2s;
  }
  .transfer-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Log ── */
  #log {
    margin: 0 0 12px;
    background: #050505;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: #0c0;
    max-height: 100px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }

  canvas#work { display: none; }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">⌚</div>
  <div>
    <h1>PHOTO WATCHFACE</h1>
    <p>Pebble Time Round · 180×180</p>
  </div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-new" onclick="switchTab('new')">NEW IMAGE</div>
  <div class="tab" id="tab-saved" onclick="switchTab('saved')">SAVED <span id="saved-count"></span></div>
  <div class="tab" id="tab-log" onclick="switchTab('log')">LOG</div>
</div>

<!-- NEW IMAGE PANEL -->
<div class="panel active" id="panel-new">
  <div class="section-label">Image URL</div>
  <div class="input-row">
    <input class="url-input" id="urlInput" type="url" placeholder="https://example.com/image.png">
    <button class="btn btn-primary" id="btnLoad" onclick="loadURL()">Load</button>
  </div>

  <div class="preview-area" id="previewArea">
    <div class="watch-bezel">
      <div class="watch-screen">
        <canvas id="previewCanvas" width="130" height="130"></canvas>
      </div>
    </div>
    <div class="preview-meta" id="previewMeta">—</div>
  </div>

  <div class="prog-wrap" id="progWrap">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-label" id="progLabel">Processing…</div>
  </div>

  <div class="action-row" id="actionRow" style="display:none">
    <button class="btn btn-send" id="btnSend" onclick="sendToWatch(currentBytes)" disabled>Send to Watch</button>
    <button class="btn btn-ghost" onclick="showSaveRow()">Save</button>
  </div>

  <div class="save-row" id="saveRow">
    <input class="save-name-input" id="saveNameInput" placeholder="Name this image…" maxlength="32">
    <button class="btn btn-ghost" onclick="saveCurrentImage()">Save</button>
  </div>
</div>

<!-- SAVED PANEL -->
<div class="panel" id="panel-saved">
  <div id="imageList"></div>
</div>

<!-- LOG PANEL -->
<div class="panel" id="panel-log">
  <div id="log">ready
</div>
</div>

<!-- Transfer overlay -->
<div class="transfer-overlay" id="transferOverlay">
  <div class="transfer-title">📡 SENDING TO WATCH</div>
  <div class="transfer-prog-track">
    <div class="transfer-prog-fill" id="transferFill"></div>
  </div>
  <div class="transfer-label" id="transferLabel">Preparing…</div>
</div>

<!-- Hidden canvases -->
<canvas id="work" width="180" height="180"></canvas>

<script>
// ── Logging ────────────────────────────────────────────────────────────────
var logEl = document.getElementById('log');
function dbg(msg) {
  console.log('[PF] ' + msg);
  logEl.textContent += '\n' + msg;
  logEl.scrollTop = logEl.scrollHeight;
}
dbg('Pebble available: ' + (typeof Pebble !== 'undefined'));

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'saved') renderSavedList();
}

// ── Pebble 64-color palette + Floyd-Steinberg ──────────────────────────────
var PALETTE = (function() {
  var p = [];
  for (var r=0;r<4;r++) for (var g=0;g<4;g++) for (var b=0;b<4;b++)
    p.push({r:r*85, g:g*85, b:b*85});
  return p;
}());

function nearestColor(r,g,b) {
  var best=PALETTE[0], bd=1e9;
  for (var i=0;i<PALETTE.length;i++) {
    var c=PALETTE[i];
    var d=(r-c.r)*(r-c.r)*0.299+(g-c.g)*(g-c.g)*0.587+(b-c.b)*(b-c.b)*0.114;
    if(d<bd){bd=d;best=c;}
  }
  return best;
}

function floydSteinberg(ctx, w, h) {
  var id=ctx.getImageData(0,0,w,h), d=id.data;
  for (var y=0;y<h;y++) for (var x=0;x<w;x++) {
    var i=4*(y*w+x);
    var c=nearestColor(d[i],d[i+1],d[i+2]);
    var er=d[i]-c.r, eg=d[i+1]-c.g, eb=d[i+2]-c.b;
    d[i]=c.r; d[i+1]=c.g; d[i+2]=c.b;
    function spread(dx,dy,f){
      if(x+dx<0||x+dx>=w||y+dy<0||y+dy>=h)return;
      var ni=4*((y+dy)*w+(x+dx));
      d[ni]+=er*f; d[ni+1]+=eg*f; d[ni+2]+=eb*f;
    }
    spread(1,0,7/16); spread(-1,1,3/16); spread(0,1,5/16); spread(1,1,1/16);
  }
  ctx.putImageData(id,0,0);
}

// ── State ──────────────────────────────────────────────────────────────────
var currentBytes = null;
var currentDataURL = null;
var CHUNK_SIZE = 200;

// ── Progress helpers ───────────────────────────────────────────────────────
function showProg(show, pct, label) {
  var w = document.getElementById('progWrap');
  w.className = 'prog-wrap' + (show ? ' show' : '');
  if (show) {
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progLabel').textContent = label;
  }
}

// ── Load & process image from URL ─────────────────────────────────────────
function loadURL() {
  var url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  
  // Route through CORS proxy
  var proxiedURL = 'https://corsproxy.io/?' + encodeURIComponent(url);
  
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() { processImage(img); };
  img.onerror = function() { dbg('ERROR: failed to load image'); };
  img.src = proxiedURL;
}

function processImage(img) {
  showProg(true, 25, 'Scaling to 180×180…');
  var work = document.getElementById('work');
  var wctx = work.getContext('2d');
  var size = Math.min(img.width, img.height);
  wctx.clearRect(0,0,180,180);
  wctx.drawImage(img, (img.width-size)/2, (img.height-size)/2, size, size, 0, 0, 180, 180);

  showProg(true, 50, 'Dithering to 64 colors…');
  setTimeout(function() {
    floydSteinberg(wctx, 180, 180);

    // Copy to preview canvas
    var pCanvas = document.getElementById('previewCanvas');
    pCanvas.getContext('2d').drawImage(work, 0,0,180,180, 0,0,130,130);
    document.getElementById('previewArea').className = 'preview-area show';

    showProg(true, 75, 'Encoding PNG…');
    setTimeout(function() {
      var dataURL = work.toDataURL('image/png');
      currentDataURL = dataURL;
      var b64 = dataURL.split(',')[1];
      var bin = atob(b64);
      var bytes = new Array(bin.length);
      for (var i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
      currentBytes = bytes;

      dbg('PNG ready: ' + bytes.length + ' bytes (' + (bytes.length/1024).toFixed(1) + ' KB)');
      document.getElementById('previewMeta').textContent =
        '180×180 · Pebble 64-color dither\n' + (bytes.length/1024).toFixed(1) + ' KB PNG · ready to send';

      showProg(false);
      document.getElementById('btnSend').disabled = false;
      document.getElementById('actionRow').style.display = 'flex';
    }, 30);
  }, 30);
}

// ── Save ───────────────────────────────────────────────────────────────────
function showSaveRow() {
  document.getElementById('saveRow').className = 'save-row show';
  document.getElementById('saveNameInput').focus();
}

function saveCurrentImage() {
  if (!currentBytes || !currentDataURL) return;
  var name = document.getElementById('saveNameInput').value.trim();
  if (!name) name = 'Image ' + (getSaved().length + 1);

  var saved = getSaved();
  saved.push({
    id: Date.now(),
    name: name,
    dataURL: currentDataURL,
    size: currentBytes.length,
    url: document.getElementById('urlInput').value.trim(),
    savedAt: new Date().toLocaleDateString()
  });
  setSaved(saved);
  document.getElementById('saveRow').className = 'save-row';
  document.getElementById('saveNameInput').value = '';
  updateSavedCount();
  dbg('saved: ' + name);
}

function getSaved() {
  try { return JSON.parse(localStorage.getItem('pf_images') || '[]'); }
  catch(e) { return []; }
}
function setSaved(arr) {
  localStorage.setItem('pf_images', JSON.stringify(arr));
}
function updateSavedCount() {
  var n = getSaved().length;
  document.getElementById('saved-count').textContent = n > 0 ? '(' + n + ')' : '';
}

// ── Render saved list ──────────────────────────────────────────────────────
function renderSavedList() {
  var saved = getSaved();
  var el = document.getElementById('imageList');
  updateSavedCount();

  if (saved.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🖼️</div>No saved images yet.<br>Load an image and tap Save.</div>';
    return;
  }

  el.innerHTML = '';
  saved.forEach(function(item) {
    var card = document.createElement('div');
    card.className = 'image-card';

    var thumbDiv = document.createElement('div');
    thumbDiv.className = 'card-thumb';
    var thumbCanvas = document.createElement('canvas');
    thumbCanvas.width = 52; thumbCanvas.height = 52;
    thumbDiv.appendChild(thumbCanvas);

    // Draw thumbnail from saved dataURL
    var tImg = new Image();
    tImg.onload = function() {
      thumbCanvas.getContext('2d').drawImage(tImg, 0,0,180,180, 0,0,52,52);
    };
    tImg.src = item.dataURL;

    var info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML =
      '<div class="card-name">' + escHtml(item.name) + '</div>' +
      '<div class="card-meta">' + (item.size/1024).toFixed(1) + ' KB · ' + item.savedAt + '</div>';

    var actions = document.createElement('div');
    actions.className = 'card-actions';

    var sendBtn = document.createElement('button');
    sendBtn.className = 'card-btn card-btn-send';
    sendBtn.textContent = 'Send';
    sendBtn.onclick = (function(i) { return function() { sendSavedImage(i); }; })(item);

    var delBtn = document.createElement('button');
    delBtn.className = 'card-btn card-btn-del';
    delBtn.textContent = '✕';
    delBtn.onclick = (function(id) { return function() { deleteImage(id); }; })(item.id);

    actions.appendChild(sendBtn);
    actions.appendChild(delBtn);
    card.appendChild(thumbDiv);
    card.appendChild(info);
    card.appendChild(actions);
    el.appendChild(card);
  });
}

function deleteImage(id) {
  var saved = getSaved().filter(function(i) { return i.id !== id; });
  setSaved(saved);
  renderSavedList();
  dbg('deleted image id=' + id);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Send saved image ───────────────────────────────────────────────────────
function sendSavedImage(item) {
  dbg('preparing saved image: ' + item.name);
  var b64 = item.dataURL.split(',')[1];
  var bin = atob(b64);
  var bytes = new Array(bin.length);
  for (var i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
  sendToWatch(bytes);
}

// ── Transfer ───────────────────────────────────────────────────────────────
function showTransfer(show, pct, label) {
  document.getElementById('transferOverlay').className = 'transfer-overlay' + (show ? ' show' : '');
  if (show) {
    document.getElementById('transferFill').style.width = pct + '%';
    document.getElementById('transferLabel').textContent = label || '';
  }
}

function sendToWatch(bytes) {
  if (!bytes) { dbg('no bytes to send'); return; }

  if (typeof Pebble === 'undefined' || typeof Pebble.sendAppMessage !== 'function') {
    dbg('ERROR: Pebble.sendAppMessage not available');
    dbg('Must be opened from within the Pebble app');
    return;
  }

  var total = bytes.length;
  dbg('starting transfer: ' + total + ' bytes');
  showTransfer(true, 0, 'Starting…');
  document.getElementById('btnSend').disabled = true;

  Pebble.sendAppMessage(
    { 'NETDL_BEGIN': total },
    function() {
      dbg('NETDL_BEGIN ack');
      sendChunk(0);
    },
    function(e) {
      dbg('NETDL_BEGIN nack: ' + e);
      showTransfer(false);
      document.getElementById('btnSend').disabled = false;
    }
  );

  function sendChunk(offset) {
    if (offset >= total) {
      Pebble.sendAppMessage(
        { 'NETDL_END': total },
        function() {
          dbg('done!');
          showTransfer(true, 100, 'Done! ✓');
          setTimeout(function() {
            showTransfer(false);
            document.getElementById('btnSend').disabled = false;
            var ret = getReturnURL();
            if (ret !== 'pebblejs://close#') {
              document.location = ret + encodeURIComponent(JSON.stringify({ action: 'done' }));
            }
          }, 1200);
        },
        function(e) {
          dbg('NETDL_END nack: ' + e);
          showTransfer(false);
          document.getElementById('btnSend').disabled = false;
        }
      );
      return;
    }

    var slice = bytes.slice(offset, offset + CHUNK_SIZE);
    var pct = Math.round((offset / total) * 100);
    showTransfer(true, pct, pct + '% · ' + offset + ' / ' + total + ' bytes');

    Pebble.sendAppMessage(
      { 'NETDL_DATA': slice },
      function() { sendChunk(offset + CHUNK_SIZE); },
      function(e) {
        dbg('chunk nack at ' + offset + ', retrying…');
        Pebble.sendAppMessage(
          { 'NETDL_DATA': slice },
          function() { sendChunk(offset + CHUNK_SIZE); },
          function(e2) {
            dbg('chunk retry failed: ' + e2);
            showTransfer(false);
            document.getElementById('btnSend').disabled = false;
          }
        );
      }
    );
  }
}

function getReturnURL() {
  var q = location.search.substring(1);
  var vars = q.split('&');
  for (var i=0; i<vars.length; i++) {
    var p = vars[i].split('=');
    if (p[0]==='return_to') return decodeURIComponent(p[1]);
  }
  return 'pebblejs://close#';
}

// ── Init ───────────────────────────────────────────────────────────────────
updateSavedCount();

// Allow pressing Enter in URL field
document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadURL();
});
</script>
